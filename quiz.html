<!DOCTYPE html>
<html>
  <head>
    <title>Course Quiz</title>
    <style>
      body {
        text-align: center;
        font-family: Arial, sans-serif;
      }
      .quiz-container {
        margin: 20px auto;
        width: 80%;
      }
      .finish-button {
        text-decoration: none;
        color: white;
        background-color: #4caf50;
        padding: 15px 30px;
        border-radius: 5px;
        font-size: 18px;
        transition: background-color 0.3s;
        cursor: pointer;
        margin-top: 20px;
        display: inline-block;
      }
      .finish-button:hover {
        background-color: #45a049;
      }
    </style>
  </head>
  <body>
    <h1>Test Your Knowledge</h1>
    <p>Finish the quiz to unlock the course registration form!</p>
    <div class="quiz-container" id="quiz-container">
      <iframe
        src="https://kahoot.it/challenge/08426624?challenge-id=247488cb-bd8f-465b-817d-444bb41470c3_1740222436224"
        width="100%"
        height="600px"
        allowfullscreen
      >
      </iframe>
    </div>
    <p>
      After completing the quiz, you'll be redirected to the registration form.
    </p>
    <a href="congratulation.html" class="finish-button"
      >I've Completed the Quiz</a
    >
  </body>
</html>
